# JUnit 5 parallel execution.
#
# Enabled once mock-backed test isolation landed: every mock-backed test is
# session-isolated, so tests across classes can run concurrently without racing
# on the shared singleton mock servers.
#   - Relay (relay/*MockTest): the mock_relay journal AND scenario store are
#     session-scoped by the RELAY handshake `sessionid`. Each test scopes its
#     harness view to its own connected client (mock = mock.scopedTo(client)).
#   - REST (rest/*MockTest): REST is pure request/response with no handshake, so
#     each test's client uses a unique random project (`test_proj_<hex>`) => a
#     unique Authorization header. The harness filters the shared journal by that
#     header (client-side) and the mock_signalwire scenario store scopes overrides
#     by it (server-side), so a test only ever sees/consumes its own
#     requests/scenarios.
#
# Concurrency model: run top-level test classes in parallel, methods within a
# class sequentially (same_thread). This matches the TypeScript port's
# file-parallel model (vitest fileParallelism) and keeps per-class state (the
# instance `client`/`mock` fields set in @BeforeEach) single-threaded.
junit.jupiter.execution.parallel.enabled = true
junit.jupiter.execution.parallel.mode.default = same_thread
junit.jupiter.execution.parallel.mode.classes.default = concurrent
junit.jupiter.execution.parallel.config.strategy = dynamic
junit.jupiter.execution.parallel.config.dynamic.factor = 1
