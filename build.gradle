import com.vanniktech.maven.publish.SonatypeHost

plugins {
    id 'java-library'
    id 'com.vanniktech.maven.publish' version '0.29.0'
    // FMT gate: Spotless drives google-java-format over all Java sources. The
    // run-ci.sh FMT gate runs `spotlessApply` locally (auto-fix) and
    // `spotlessCheck` in CI (read-only). google-java-format is the canonical
    // Java formatter — analogous to gofmt/rustfmt — so there is no style to
    // bikeshed and the reformat is provably surface/emission-neutral.
    id 'com.diffplug.spotless' version '6.25.0'
    // LINT gate (two layers, both blocking, both burned to zero):
    //   1. Error Prone — Google's compile-time bug-pattern checker, wired via
    //      the net.ltgt.errorprone plugin with warnings-as-errors.
    //   2. Checkstyle — the gradle built-in plugin, config in config/checkstyle.
    id 'net.ltgt.errorprone' version '3.1.0'
    id 'checkstyle'
}

group = 'com.signalwire'
version = '2.0.2'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

// Preserve method-parameter names in compiled bytecode. Required by the
// signature-audit adapter (scripts/SignatureDump.java) which reads
// parameter names via reflection; without -parameters they show up as
// arg0/arg1/... and the diff against the Python reference loses them.
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += '-parameters'
}

repositories {
    mavenCentral()
}

dependencies {
    // JSON
    implementation 'com.google.code.gson:gson:2.14.0'

    // YAML — used by PromptObjectModel.fromYaml/toYaml for byte-identical
    // round-trip parity with Python's pyyaml-based pom.py.
    implementation 'org.yaml:snakeyaml:2.6'

    // WebSocket for RELAY
    implementation 'org.java-websocket:Java-WebSocket:1.6.0'

    // Servlet API — compileOnly so the Servlet WebhookFilter compiles for
    // users running on Tomcat / Jetty / similar containers, but doesn't drag
    // any servlet runtime into apps that use the JDK HttpServer-based
    // AgentServer. Per porting-sdk/webhooks.md the Java port MUST ship a
    // servlet-style filter.
    compileOnly 'javax.servlet:javax.servlet-api:4.0.1'

    // LINT gate — Error Prone bug-pattern checker (runs in the compiler).
    errorprone 'com.google.errorprone:error_prone_core:2.27.1'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:6.1.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    // Servlet API on the test classpath so the WebhookFilter tests can
    // compile against javax.servlet.* without forcing it into the SDK
    // runtime.
    testImplementation 'javax.servlet:javax.servlet-api:4.0.1'
}

test {
    useJUnitPlatform()
}

// FMT gate — Spotless + google-java-format over every Java source set (main,
// test, and the tools/CLI sources that live under src/main + src/test). The
// formatter is source-style only and proven surface/emission-neutral (a
// reformat leaves port_signatures.json + port_surface.json byte-identical and
// EMISSION 81/81 — verified during the rollout). run-ci.sh's FMT gate runs
// `spotlessApply` locally and `spotlessCheck` in CI.
spotless {
    java {
        target 'src/**/*.java'
        googleJavaFormat('1.22.0')
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }
}

// LINT gate, layer 1 — Error Prone. Runs inside javac as a bug-pattern
// checker. Warnings-as-errors so any pattern Error Prone flags fails the
// build (and thus the LINT gate). MEASURE-ONLY toggle: pass
// -PerrorproneMeasure to demote everything to a warning so the raw burndown
// volume can be counted without failing the build.
import net.ltgt.gradle.errorprone.CheckSeverity
tasks.withType(JavaCompile).configureEach {
    options.errorprone {
        if (project.hasProperty('errorproneMeasure')) {
            // MEASURE-ONLY: demote everything to a warning so the raw burndown
            // volume can be counted without failing the build.
            allErrorsAsWarnings = true
        } else {
            // Burndown floor: every Error Prone bug pattern is an ERROR (the
            // build, and thus the LINT gate, fails on any finding). The whole
            // default bug-pattern set was burned to zero in the rollout.
            allErrorsAsWarnings = false
        }
        // The three Javadoc-PROSE checks below are turned OFF (not suppressed
        // per-site). They police documentation completeness/markup quality —
        // LLM-irrelevant prose, never wire/surface/correctness — so per
        // porting-sdk RULES.md they are idiom, not a parity floor. Turning them
        // off keeps the gate focused on real bug patterns rather than forcing
        // boilerplate "@return the foo" summaries onto self-evident accessors.
        check('MissingSummary', CheckSeverity.OFF)   // javadoc summary fragment
        check('InvalidLink', CheckSeverity.OFF)       // javadoc {@link} resolution
        check('EscapedEntity', CheckSeverity.OFF)     // javadoc HTML-entity prose
        // The three checks below are OFF with a specific rationale — each would
        // force an API/contract change, never a wire/surface change, so per
        // RULES.md they cannot be obeyed without de-idiomatizing the port:
        //   * AnnotateFormatMethod — adding @FormatMethod to Logger.log()
        //     cascades FormatStringAnnotation errors onto every debug/info/warn/
        //     error caller and up the whole logging call chain; annotating the
        //     entire logging API to satisfy one site is not idiomatic.
        //   * IterableAndIterator — PaginatedIterator is a public final SDK type
        //     using the standard self-iterable pattern (implements both); the
        //     only "fix" is dropping a public interface = a surface change.
        //   * JdkObsolete — WebhookFilterTest's HttpServletRequest proxy MUST
        //     return a StringBuffer from getRequestURL() (the servlet contract's
        //     declared type); a StringBuilder would ClassCastException.
        check('AnnotateFormatMethod', CheckSeverity.OFF)
        check('IterableAndIterator', CheckSeverity.OFF)
        check('JdkObsolete', CheckSeverity.OFF)
    }
}

// LINT gate, layer 2 — Checkstyle. Config authored in config/checkstyle/
// checkstyle.xml; the rule set is a Google/Sun-derived style consistent with
// what google-java-format produces (it does NOT fight the formatter). Burned
// to zero; maxWarnings=0 so any violation fails the gate.
checkstyle {
    toolVersion = '10.17.0'
    configFile = file('config/checkstyle/checkstyle.xml')
    maxWarnings = 0
    maxErrors = 0
    ignoreFailures = project.hasProperty('checkstyleMeasure')
}

// Print the runtime classpath, one entry per line. Used by the doc-audit
// example-compile step so example sources can find every dep the SDK
// itself uses (Gson, etc.) without re-pinning versions in CI.
tasks.register('printRuntimeClasspath') {
    doLast {
        configurations.runtimeClasspath.each { println it }
    }
}

// emitCorpus — the Java port's EMISSION-DUMP entry point for the cross-port
// emission differ (porting-sdk/scripts/diff_port_emission.py). Runs
// com.signalwire.sdk.tools.EmitCorpus, which builds the shared 81-entry
// FunctionResult corpus natively and prints one JSON object {id -> emission}
// to stdout (logs to stderr). Invoke quietly so only that JSON reaches stdout:
//   ./gradlew --no-daemon -q emitCorpus
// The differ runs `./gradlew --no-daemon -q emitCorpus` and byte-compares each
// entry against Python's to_dict(). Mirrors Go's cmd/emit-corpus.
tasks.register('emitCorpus', JavaExec) {
    group = 'verification'
    description = 'Dump the shared FunctionResult emission corpus as JSON (cross-port emission differ).'
    mainClass = 'com.signalwire.sdk.tools.EmitCorpus'
    classpath = sourceSets.main.runtimeClasspath
}

// emitSkills — the Java port's SKILL-DUMP entry point for the cross-port
// SKILL-CONTRACT differ (porting-sdk/scripts/diff_skill_contracts.py). Runs
// com.signalwire.sdk.tools.EmitSkills, which reads the shared skill corpus
// (porting-sdk/scripts/skill_contract_corpus.py), instantiates each covered
// skill, and prints one JSON object {id -> [tool-contract]} to stdout (logs to
// stderr). Invoke quietly so only that JSON reaches stdout:
//   ./gradlew --no-daemon -q emitSkills
// The differ runs `./gradlew --no-daemon -q emitSkills` and structurally
// compares each skill's tool contract against the Python reference. Sibling of
// emitCorpus; mirrors Go's cmd/emit-skills + Ruby's bin/emit-skills.
tasks.register('emitSkills', JavaExec) {
    group = 'verification'
    description = 'Dump the built-in skill tool contracts as JSON (cross-port skill-contract differ).'
    mainClass = 'com.signalwire.sdk.tools.EmitSkills'
    classpath = sourceSets.main.runtimeClasspath
}

// routeRegistry — the Java port's SET-B program for the cross-port SPEC-PARITY
// gate (porting-sdk/scripts/diff_spec_implementation.py --registry-json). Runs
// com.signalwire.sdk.rest.RouteRegistry, which drives the live RestClient
// through a recording HttpClient (records (method, path), returns an empty map,
// no network) and reflects over every namespace/sub-resource route method,
// invoking each with sentinel args — so it sees every dispatched route whether
// or not it's tested (not an AST scrape, not the journal). It prints ONE JSON
// object {routes,skipped,errors} to stdout (logs/errors to stderr) and exits
// non-zero if Set B is incomplete. Invoke quietly so only that JSON reaches
// stdout:
//   ./gradlew --no-daemon -q routeRegistry
// The SPEC-PARITY gate feeds that JSON to the shared diff via --registry-json.
// Mirrors Go's cmd/route-registry + TypeScript's scripts/route-registry.ts.
tasks.register('routeRegistry', JavaExec) {
    group = 'verification'
    description = 'Enumerate the REST routes the SDK implements as JSON (cross-port SPEC-PARITY gate).'
    mainClass = 'com.signalwire.sdk.rest.RouteRegistry'
    classpath = sourceSets.main.runtimeClasspath
}

// routeTestPlan — the per-via call plan the REST wire-test generator
// (scripts/generate_rest_tests.py) consumes. Runs com.signalwire.sdk.rest.
// RouteTestPlan, which drives the live RestClient through a recording HttpClient
// (same shape as RouteRegistry) and reflects over every route method, emitting
// per via the accessor chain, terminal member, and type-correct Java literal
// args. Prints ONE JSON object {plan,errors} to stdout, exits non-zero if any
// route is unreflectable. Invoke quietly so only that JSON reaches stdout:
//   ./gradlew --no-daemon -q routeTestPlan
tasks.register('routeTestPlan', JavaExec) {
    group = 'verification'
    description = 'Per-via REST call plan (chain/member/typed args) for the wire-test generator.'
    mainClass = 'com.signalwire.sdk.rest.RouteTestPlan'
    classpath = sourceSets.main.runtimeClasspath
}

// ── Layer-D per-surface dump programs ───────────────────────────────
// Each is a main() entry point in com.signalwire.sdk.tools that runs the
// shared behavioral corpus against the Java SDK's native API and prints ONE
// canonical JSON object {case-id -> observable-artifact} to stdout (logs to
// stderr). The porting-sdk differ (diff_port_<surface>.py) runs the task via
// `./gradlew --no-daemon -q <task>` and byte-compares each entry against the
// Python oracle. Mirrors Go's cmd/{wire,swml,wire-relay,http,state}-dump.

// wireDump — WIRE-CRYPTO differ (porting-sdk/scripts/diff_port_wire.py).
tasks.register('wireDump', JavaExec) {
    group = 'verification'
    description = 'Dump the wire-crypto corpus observations as JSON (cross-port wire differ).'
    mainClass = 'com.signalwire.sdk.tools.WireDump'
    classpath = sourceSets.main.runtimeClasspath
}

// swmlDump — SWML differ (porting-sdk/scripts/diff_port_swml.py).
tasks.register('swmlDump', JavaExec) {
    group = 'verification'
    description = 'Dump the SWML render corpus fragments as JSON (cross-port SWML differ).'
    mainClass = 'com.signalwire.sdk.tools.SwmlDump'
    classpath = sourceSets.main.runtimeClasspath
}

// stateDump — STATE differ (porting-sdk/scripts/diff_port_state.py).
tasks.register('stateDump', JavaExec) {
    group = 'verification'
    description = 'Dump the state-mutation corpus observations as JSON (cross-port state differ).'
    mainClass = 'com.signalwire.sdk.tools.StateDump'
    classpath = sourceSets.main.runtimeClasspath
}

// httpDump — HTTP differ (porting-sdk/scripts/diff_port_http.py).
tasks.register('httpDump', JavaExec) {
    group = 'verification'
    description = 'Dump the HTTP dispatch corpus observations as JSON (cross-port HTTP differ).'
    mainClass = 'com.signalwire.sdk.tools.HttpDump'
    classpath = sourceSets.main.runtimeClasspath
}

// wireRelayDump — RELAY differ (porting-sdk/scripts/diff_port_wire_relay.py).
tasks.register('wireRelayDump', JavaExec) {
    group = 'verification'
    description = 'Dump the RELAY frame + event corpus observations as JSON (cross-port relay differ).'
    mainClass = 'com.signalwire.sdk.tools.WireRelayDump'
    classpath = sourceSets.main.runtimeClasspath
}

jar {
    manifest {
        attributes 'Implementation-Title': 'SignalWire AI Agents SDK',
                   'Implementation-Version': version
    }
}

mavenPublishing {
    publishToMavenCentral(SonatypeHost.CENTRAL_PORTAL)
    signAllPublications()

    pom {
        name = 'SignalWire AI Agents SDK'
        description = 'Java SDK for building, deploying, and managing SignalWire AI agents as microservices'
        url = 'https://github.com/signalwire/signalwire-java'

        licenses {
            license {
                name = 'MIT License'
                url = 'https://opensource.org/licenses/MIT'
            }
        }

        developers {
            developer {
                id = 'signalwire'
                name = 'SignalWire'
                email = 'open.source@signalwire.com'
            }
        }

        scm {
            connection = 'scm:git:git://github.com/signalwire/signalwire-java.git'
            developerConnection = 'scm:git:ssh://github.com/signalwire/signalwire-java.git'
            url = 'https://github.com/signalwire/signalwire-java'
        }
    }
}
