plugins {
    id 'java-library'
    id 'maven-publish'
    id 'signing'
}

group = 'com.signalwire'
version = '1.1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    // JSON
    implementation 'com.google.code.gson:gson:2.10.1'

    // WebSocket for RELAY
    implementation 'org.java-websocket:Java-WebSocket:1.5.6'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes 'Implementation-Title': 'SignalWire AI Agents SDK',
                   'Implementation-Version': version
    }
}

java {
    withJavadocJar()
    withSourcesJar()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            pom {
                name = 'SignalWire AI Agents SDK'
                description = 'Java SDK for building, deploying, and managing SignalWire AI agents as microservices'
                url = 'https://github.com/signalwire/signalwire-agents-java'

                licenses {
                    license {
                        name = 'MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                    }
                }

                developers {
                    developer {
                        id = 'signalwire'
                        name = 'SignalWire'
                        email = 'open.source@signalwire.com'
                    }
                }

                scm {
                    connection = 'scm:git:git://github.com/signalwire/signalwire-agents-java.git'
                    developerConnection = 'scm:git:ssh://github.com/signalwire/signalwire-agents-java.git'
                    url = 'https://github.com/signalwire/signalwire-agents-java'
                }
            }
        }
    }

    repositories {
        maven {
            name = 'MavenCentral'
            url = 'https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/'
            credentials {
                username = System.getenv('MAVEN_USERNAME') ?: ''
                password = System.getenv('MAVEN_PASSWORD') ?: ''
            }
        }
    }
}

signing {
    def signingKey = System.getenv('SIGNING_KEY')
    def signingPassword = System.getenv('SIGNING_PASSWORD')
    useInMemoryPgpKeys(signingKey, signingPassword)
    sign publishing.publications.mavenJava
}

tasks.withType(Sign).configureEach {
    onlyIf { System.getenv('SIGNING_KEY') != null }
}
