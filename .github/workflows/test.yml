name: Test

# Runs the full per-port CI gate set: gradle test, signature regen
# (rebuilds the JAR + python adapter), drift against the Python
# reference, and the no-cheat-tests audit. Mirrors
# `bash scripts/run-ci.sh` so there's no drift between local and CI.
#
# Java quirk: the adapter at scripts/enumerate_signatures.py reads
# reflection metadata from the built JAR, so run-ci.sh's SIGNATURES
# gate runs `./gradlew --no-daemon build -x test` before invoking the
# adapter. Without that the adapter wouldn't see new methods until the
# next manual build.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout signalwire-java
        uses: actions/checkout@v5
        with:
          path: signalwire-java

      - name: Checkout porting-sdk (mock_relay + mock_signalwire test harnesses + audit scripts)
        uses: actions/checkout@v5
        with:
          repository: signalwire/porting-sdk
          path: porting-sdk
          token: ${{ secrets.PORTING_SDK_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Python (porting-sdk audit scripts + mock servers)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test harnesses (mock_relay + mock_signalwire)
        run: |
          pip install -e porting-sdk/test_harness/mock_relay
          pip install -e porting-sdk/test_harness/mock_signalwire

      - name: Run CI gate script (TEST -> SIGNATURES -> DRIFT -> NO-CHEAT)
        working-directory: signalwire-java
        env:
          PORTING_SDK: ${{ github.workspace }}/porting-sdk
        run: bash scripts/run-ci.sh
