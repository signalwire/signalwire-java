name: Live smoke (nightly, opt-in)

# Plan §6.5 real-server smoke lane: the only check that catches mock↔production
# drift the spec-sourcing pipeline hasn't closed. Opt-in and creds-gated — the live
# drive runs only when a SIGNALWIRE_TEST_TOKEN secret is present, so it SKIPS cleanly
# on forks / un-provisioned repos and stays green. Drives auth + one REST list + one
# SWML render + one RELAY connect against the REAL platform via examples/LiveSmoke.java
# (which itself no-ops without SWSDK_LIVE_TESTS=1 + real creds).

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # Nightly at 07:50 UTC.
    - cron: '50 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    env:
      HAS_CREDS: ${{ secrets.SIGNALWIRE_TEST_TOKEN }}
    steps:
      - name: Checkout signalwire-java
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Creds-gate: only run the live drive when the secret is present. Absent
      # secrets → the step is skipped and the job stays green (no false red on
      # forks / un-provisioned repos).
      - name: Live smoke against the real platform
        if: ${{ env.HAS_CREDS != '' }}
        env:
          SWSDK_LIVE_TESTS: '1'
          SIGNALWIRE_PROJECT_ID: ${{ secrets.SIGNALWIRE_TEST_PROJECT }}
          SIGNALWIRE_API_TOKEN: ${{ secrets.SIGNALWIRE_TEST_TOKEN }}
          SIGNALWIRE_SPACE: ${{ secrets.SIGNALWIRE_TEST_SPACE }}
        run: ./gradlew --no-daemon -q runExample -PexampleClass=LiveSmoke

      - name: No secrets — live smoke skipped
        if: ${{ env.HAS_CREDS == '' }}
        run: echo "SIGNALWIRE_TEST_TOKEN not configured; live smoke skipped (green)."
